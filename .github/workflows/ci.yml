name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}: check, lint, type-check, test"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check out basis-core sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/basis-core
          path: ../basis-core

      - name: Install basis-core (editable)
        run: pip install -e ../basis-core

      - name: Install basis-gateway with dev dependencies
        run: pip install -e ".[dev]"

      - name: Format check
        run: ruff format --check src tests

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src

      - name: Tests
        run: pytest
